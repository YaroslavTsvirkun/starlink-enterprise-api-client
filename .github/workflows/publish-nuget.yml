name: Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.NUGET_API_KEY }}")) {
              throw "Secret NUGET_API_KEY is required."
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.NUGET_SIGN_CERT_BASE64 }}")) {
              throw "Secret NUGET_SIGN_CERT_BASE64 is required."
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.NUGET_SIGN_CERT_PASSWORD }}")) {
              throw "Secret NUGET_SIGN_CERT_PASSWORD is required."
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.NUGET_SIGN_TIMESTAMP_URL }}")) {
              throw "Secret NUGET_SIGN_TIMESTAMP_URL is required."
          }

      - name: Restore signing certificate
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "nuget-signing-cert.pfx"
          $certBytes = [Convert]::FromBase64String("${{ secrets.NUGET_SIGN_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)

          "NUGET_API_KEY=${{ secrets.NUGET_API_KEY }}" >> $env:GITHUB_ENV
          "NUGET_SIGN_CERT_PATH=$certPath" >> $env:GITHUB_ENV
          "NUGET_SIGN_CERT_PASSWORD=${{ secrets.NUGET_SIGN_CERT_PASSWORD }}" >> $env:GITHUB_ENV
          "NUGET_SIGN_TIMESTAMP_URL=${{ secrets.NUGET_SIGN_TIMESTAMP_URL }}" >> $env:GITHUB_ENV

      - name: Build, sign, and publish package
        shell: pwsh
        run: ./build/Publish-NuGet.ps1
