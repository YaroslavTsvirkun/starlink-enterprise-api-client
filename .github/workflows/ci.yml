name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore StarlinkEnterprise.ApiClient.slnx --nologo

      - name: Build
        run: dotnet build StarlinkEnterprise.ApiClient.slnx --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test StarlinkEnterprise.ApiClient.slnx --configuration Release --no-build --nologo
